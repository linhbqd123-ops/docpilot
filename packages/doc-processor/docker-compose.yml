version: "3.9"

services:
  doc-processor:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: docpilot/doc-processor:latest
    container_name: docpilot-doc-processor
    restart: unless-stopped
    ports:
      - "${DOC_PROCESSOR_PORT:-8080}:8080"
    environment:
      # Server
      DOC_PROCESSOR_PORT: 8080
      # Storage paths (inside container — backed by volumes below)
      UPLOAD_DIR: /app/data/uploads
      REGISTRY_DIR: /app/data/registries
      LOG_FILE: /app/logs/doc-processor.log
      # Processing limits
      MAX_FILE_SIZE: 100MB
      MAX_REQUEST_SIZE: 110MB
      MAX_FILE_SIZE_BYTES: 104857600
      EMBED_IMAGES: "true"
      # JVM tuning
      JAVA_OPTS: "-Xms256m -Xmx1g"
    volumes:
      - doc_uploads:/app/data/uploads
      - doc_registries:/app/data/registries
      - doc_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q 'UP' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  doc_uploads:
    driver: local
  doc_registries:
    driver: local
  doc_logs:
    driver: local
