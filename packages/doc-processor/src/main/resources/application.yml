server:
  port: ${DOC_PROCESSOR_PORT:8080}
  shutdown: graceful
  tomcat:
    max-swallow-size: -1  # allow large multipart bodies

spring:
  application:
    name: doc-processor
  lifecycle:
    timeout-per-shutdown-phase: 30s
  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:100MB}
      max-request-size: ${MAX_REQUEST_SIZE:110MB}
      file-size-threshold: 2MB   # spool to disk above this threshold
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ── DocPilot custom properties ──────────────────────────────────────────────
docpilot:
  storage:
    upload-dir: ${UPLOAD_DIR:./data/uploads}
    registry-dir: ${REGISTRY_DIR:./data/registries}
  processing:
    max-file-size-bytes: ${MAX_FILE_SIZE_BYTES:104857600}  # 100 MB
    embed-images-in-html: ${EMBED_IMAGES:true}

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: DocPilot Doc Processor
    version: 1.0.0
    description: High-fidelity DOCX/PDF processing service

# ── SpringDoc / Swagger ───────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    io.docpilot: DEBUG
    # docx4j is very chatty — suppress to WARN in normal operation
    org.docx4j: WARN
    org.pptx4j: WARN
    org.xlsx4j: WARN
    org.plutext: WARN
    org.apache.pdfbox: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:./logs/doc-processor.log}
